<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e74c3c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>番茄时钟</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
</head>
<body>

  <!-- 登录弹窗（默认显示，JS 会在有 session 时隐藏） -->
  <div id="auth-modal" class="modal-overlay">
    <div class="login-card">
      <h1>🍅 番茄时钟</h1>
      <p class="login-subtitle">登录或注册以云端同步你的数据</p>
      <div class="auth-error" id="auth-error"></div>
      <div class="auth-success" id="auth-success"></div>
      <form id="auth-form">
        <input type="email" id="auth-email" placeholder="邮箱地址" required autocomplete="email">
        <input type="password" id="auth-pass" placeholder="密码（至少6位）" required minlength="6" autocomplete="current-password">
        <button type="submit" class="btn primary" id="btn-auth" style="width:100%">登录</button>
      </form>
      <p class="auth-switch" id="auth-switch">没有账号？<a href="#" id="link-to-register">点击注册</a></p>
    </div>
  </div>

  <!-- 主应用 -->
  <div id="app" style="display:none">
    <header>
      <h1>🍅 番茄时钟</h1>
      <div class="header-right">
        <span class="header-email" id="header-user"></span>
        <button id="theme-toggle" class="btn-icon" title="切换主题">🌙</button>
        <button id="btn-logout" class="btn-icon" title="退出登录">⏻</button>
      </div>
    </header>

    <section class="timer-section">
      <div class="mode-tabs" id="mode-tabs">
        <button class="mode-tab active" data-mode="pomodoro">🍅 番茄钟</button>
        <button class="mode-tab" data-mode="stopwatch">⏱ 正向计时</button>
      </div>
      <div class="status-label" id="status-label">准备开始</div>
      <div class="time-display" id="time-display">25:00</div>
      <div class="pomodoro-dots" id="pomodoro-dots">○ ○ ○ ○</div>
      <div class="controls" id="controls">
        <button class="btn primary" id="btn-start">开始专注</button>
      </div>
    </section>

    <section class="tasks-section">
      <h2>任务列表</h2>
      <form class="task-form" id="task-form">
        <input type="text" id="task-name" placeholder="任务名称" required>
        <input type="number" id="task-est" min="1" value="1" title="预计番茄数">
        <button type="submit" class="btn">添加</button>
      </form>
      <ul id="task-list"></ul>
    </section>

    <section class="stats-section">
      <h2>今日统计</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-value" id="stat-time">0 分钟</span>
          <span class="stat-label">专注时长</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="stat-today">0</span>
          <span class="stat-label">今日番茄</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="stat-total">0</span>
          <span class="stat-label">累计番茄</span>
        </div>
      </div>
    </section>

    <section class="settings-section">
      <h2 class="settings-toggle" id="settings-toggle">设置 ▾</h2>
      <div class="settings-body" id="settings-body" style="display:none">
        <div class="settings-grid">
          <label>专注 (分钟)</label>
          <input type="number" id="set-focus" min="1" max="120" value="25">
          <label>短休息 (分钟)</label>
          <input type="number" id="set-short" min="1" max="60" value="5">
          <label>长休息 (分钟)</label>
          <input type="number" id="set-long" min="1" max="60" value="15">
          <label>循环次数</label>
          <input type="number" id="set-cycle" min="1" max="10" value="4">
          <label>提示音</label>
          <div class="sound-picker">
            <select id="set-sound"></select>
            <button type="button" class="btn-icon" id="btn-preview-sound" title="试听">&#9654;</button>
          </div>
          <label>深色模式</label>
          <select id="set-theme">
            <option value="0">浅色</option>
            <option value="1">深色</option>
          </select>
        </div>
        <button class="btn primary" id="btn-save-settings" style="margin-top:12px;width:100%">保存设置</button>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/state.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
